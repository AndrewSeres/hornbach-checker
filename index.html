<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hornbach Brikety Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Satoshi:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#e5e5e5; font-family:'Satoshi','Inter',system-ui,sans-serif; min-height:100vh; }
  .mono { font-family:'JetBrains Mono',monospace; }

  /* Header */
  .header { background:linear-gradient(135deg,#F4600C,#c44d00); padding:28px 32px 24px; position:relative; overflow:hidden; }
  .header::after { content:''; position:absolute; top:-40px; right:-20px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.06); }
  .header-inner { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:12px; position:relative; z-index:1; }
  .header-sub { font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.6); margin-bottom:6px; }
  .header h1 { font-size:28px; font-weight:900; color:#fff; letter-spacing:-0.5px; }
  .header-right { display:flex; align-items:center; gap:12px; }
  .header-info { color:rgba(255,255,255,0.7); font-size:13px; }
  .btn-refresh { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); color:#fff; border-radius:8px; padding:6px 14px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-refresh:hover { background:rgba(255,255,255,0.25); }

  /* Tabs */
  .tabs { display:flex; background:#141414; border-bottom:1px solid #2a2a2a; padding:0 24px; }
  .tab { background:transparent; border:none; color:#777; font-size:14px; font-weight:500; padding:14px 20px; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; font-family:inherit; }
  .tab.active { color:#F4600C; font-weight:700; border-bottom-color:#F4600C; }
  .tab:hover { color:#ccc; }

  .content { padding:24px; max-width:1100px; margin:0 auto; }

  /* Cards */
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:24px; }
  .card { background:#1a1a1a; border-radius:12px; padding:16px 18px; border-left:3px solid #888; }
  .card-label { font-size:12px; color:#888; font-weight:600; margin-bottom:6px; }
  .card-value { font-size:26px; font-weight:900; }
  .card-unit { font-size:11px; color:#555; margin-top:2px; }

  /* Table */
  .table-wrap { overflow-x:auto; border-radius:12px; border:1px solid #2a2a2a; background:#141414; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  thead tr { border-bottom:2px solid #333; }
  th { padding:12px 8px; font-weight:600; font-size:12px; color:#888; text-transform:uppercase; letter-spacing:1px; }
  th:first-child { text-align:left; padding-left:16px; }
  td { padding:10px 8px; text-align:center; border-bottom:1px solid #1f1f1f; }
  td:first-child { text-align:left; padding-left:16px; }
  tbody tr { transition:background 0.15s; }
  tbody tr:hover { background:#1a1a1a; }
  .prod-name { font-weight:600; font-size:14px; }
  .prod-artikl { font-size:11px; color:#666; margin-top:2px; }
  .price { font-weight:700; color:#F4600C; font-size:14px; }

  /* Badges */
  .badge { font-weight:700; font-size:13px; padding:3px 10px; border-radius:6px; display:inline-block; min-width:48px; text-align:center; }
  .badge-green { background:#bbf7d0; color:#166534; }
  .badge-yellow { background:#fef08a; color:#854d0e; }
  .badge-lime { background:#d9f99d; color:#3f6212; }
  .badge-red { background:#fecaca; color:#991b1b; }
  .badge-grey { background:#eeeeee; color:#888; }
  .diff-down { color:#dc2626; font-weight:700; font-size:13px; }
  .diff-up { color:#16a34a; font-weight:700; font-size:13px; }
  .diff-zero { color:#888; font-size:12px; }

  /* Chart */
  .chart-box { background:#141414; border-radius:12px; border:1px solid #2a2a2a; padding:20px 16px; margin-top:24px; }
  .chart-title { margin:0 0 16px 8px; font-size:14px; font-weight:700; color:#aaa; }
  .product-btns { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .prod-btn { border-radius:8px; padding:8px 14px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:inherit; border:1px solid #333; background:#1a1a1a; color:#999; }
  .prod-btn.active { color:#fff; }

  /* Diff info */
  .diff-info { margin-bottom:20px; padding:14px 18px; background:#1a1a1a; border-radius:10px; border:1px solid #2a2a2a; font-size:13px; color:#999; }
  .diff-info strong { color:#ccc; }
  .diff-info .curr { color:#F4600C; }

  /* Loading / Error */
  .center-msg { text-align:center; padding:60px 20px; }
  .spinner { width:40px; height:40px; border:3px solid #333; border-top:3px solid #F4600C; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error-btn { background:#F4600C; color:#fff; border:none; border-radius:8px; padding:10px 24px; font-size:14px; font-weight:600; cursor:pointer; margin-top:12px; }
  .tip { margin-top:16px; padding:14px 18px; background:#1a1a1a; border-radius:10px; border:1px solid #2a2a2a; font-size:12px; color:#666; }

  .footer { text-align:center; padding:32px 20px; color:#333; font-size:11px; border-top:1px solid #1a1a1a; margin-top:40px; }

  .diff-row-neg { background:#1a0a0a; }
  .diff-row-pos { background:#0a1a0a; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="header-sub">HORNBACH SLOVENSKO</div>
      <h1>🔥 Brikety Tracker</h1>
    </div>
    <div class="header-right">
      <span class="header-info mono" id="run-count"></span>
      <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="current" onclick="switchTab('current',this)">Aktuálny stav</button>
  <button class="tab" data-tab="diff" onclick="switchTab('diff',this)">Porovnanie</button>
  <button class="tab" data-tab="chart" onclick="switchTab('chart',this)">Graf</button>
</div>

<div class="content">
  <div id="loading" class="center-msg"><div class="spinner"></div><div style="color:#888">Načítavam dáta z Google Sheets...</div></div>
  <div id="error" class="center-msg" style="display:none"></div>
  <div id="tab-current" style="display:none"></div>
  <div id="tab-diff" style="display:none"></div>
  <div id="tab-chart" style="display:none"></div>
</div>

<div class="footer">Hornbach Brikety Tracker · Live dáta z Google Sheets · Scraping každý piatok o 16:00</div>

<script>
const SHEET_ID = '1TFzGrj5gJ5_j46iTSHCBLLT_DFkzVabZ5Ko6jwzik-s';
const STORE_COLORS = { 'Nitra':'#F4600C','BA Ružinov':'#2563eb','BA Devínska':'#7c3aed','Košice':'#059669','Prešov':'#d97706' };
const PRODUCT_COLORS = ['#F4600C','#2563eb','#7c3aed','#059669','#d97706','#dc2626','#0891b2'];

let DATA = { products:[], stores:[], historyRuns:[], historyMatrix:{} };
let selectedProduct = 0;
let barChart = null, lineChart = null;

function storeColor(s) {
  const l = s.toLowerCase();
  if (l.includes('nitra')) return '#F4600C';
  if (l.includes('ružinov')||l.includes('ruzinov')) return '#2563eb';
  if (l.includes('devín')||l.includes('devin')) return '#7c3aed';
  if (l.includes('košic')||l.includes('kosic')) return '#059669';
  if (l.includes('prešov')||l.includes('presov')) return '#d97706';
  return '#888';
}

function parseCsvRow(line) {
  const r=[]; let c='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(q&&i+1<line.length&&line[i+1]==='"'){c+='"';i++}else q=!q}
    else if(ch===','&&!q){r.push(c);c=''}else c+=ch;
  }
  r.push(c); return r;
}

function parseCsv(text) {
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2) return [];
  const headers=parseCsvRow(lines[0]);
  return lines.slice(1).map(line=>{
    const vals=parseCsvRow(line);
    const obj={};
    headers.forEach((h,i)=>{obj[h.trim()]=(vals[i]||'').trim()});
    return obj;
  });
}

async function fetchSheet(name) {
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error(`Sheet "${name}": HTTP ${res.status}`);
  return parseCsv(await res.text());
}

function stockBadge(val) {
  if(val===null||val===undefined||val==='–'||val==='') return '<span style="color:#666">–</span>';
  const n=Number(val);
  if(isNaN(n)) return '<span style="color:#666">–</span>';
  let cls='badge-green';
  if(n===0) cls='badge-red'; else if(n<20) cls='badge-yellow'; else if(n<100) cls='badge-lime';
  return `<span class="badge ${cls} mono">${n.toLocaleString('sk')}</span>`;
}

function diffBadge(prev,curr) {
  const p=Number(prev),c=Number(curr);
  if(isNaN(p)||isNaN(c)) return '<span style="color:#666">–</span>';
  const d=c-p;
  if(d===0) return '<span class="diff-zero mono">0</span>';
  if(d<0) return `<span class="diff-down mono">▼ ${Math.abs(d).toLocaleString('sk')}</span>`;
  return `<span class="diff-up mono">▲ ${d.toLocaleString('sk')}</span>`;
}

async function loadData() {
  document.getElementById('loading').style.display='block';
  document.getElementById('error').style.display='none';
  ['tab-current','tab-diff','tab-chart'].forEach(id=>document.getElementById(id).style.display='none');

  try {
    const [current, history] = await Promise.all([fetchSheet('Posledný beh'), fetchSheet('História')]);

    // Parse current
    const fixedCols=['Produkt','Artikl č.','Cena'];
    const stores=Object.keys(current[0]||{}).filter(k=>!fixedCols.includes(k)&&k.trim());
    const products=current.map(row=>({
      name:row['Produkt']||'',
      artikl:String(row['Artikl č.']||'').replace(/\.0$/,''),
      price:row['Cena']||'',
      stocks:{}
    }));
    products.forEach((p,idx)=>{
      stores.forEach(s=>{
        const raw=current[idx][s];
        p.stocks[s]=(raw==='–'||raw==='')?null:Number(raw);
      });
    });

    // Parse history
    const histFixed=['Produkt','Artikl č.','Predajňa','Kľúč'];
    const dateCols=Object.keys(history[0]||{}).filter(k=>!histFixed.includes(k)&&k.trim());
    const matrix={};
    history.forEach(row=>{
      const prod=row['Produkt']||'',store=row['Predajňa']||'';
      if(!prod||!store) return;
      if(!matrix[prod]) matrix[prod]={};
      if(!matrix[prod][store]) matrix[prod][store]=[];
      dateCols.forEach(dc=>{
        const raw=row[dc];
        const val=(raw==='–'||raw===''||raw===undefined)?null:Number(raw);
        matrix[prod][store].push(isNaN(val)?null:val);
      });
    });

    DATA={products,stores,historyRuns:dateCols,historyMatrix:matrix};
    document.getElementById('run-count').textContent=dateCols.length+' behov';
    document.getElementById('loading').style.display='none';
    renderCurrent();
    renderDiff();
    renderChart();
    switchTab('current',document.querySelector('.tab.active'));
  } catch(e) {
    document.getElementById('loading').style.display='none';
    document.getElementById('error').innerHTML=`
      <div style="font-size:48px;margin-bottom:12px">⚠️</div>
      <div style="color:#dc2626;font-size:15px;font-weight:600;margin-bottom:8px">Chyba pri načítaní dát</div>
      <div style="color:#888;font-size:13px;margin-bottom:4px">${e.message}</div>
      <button class="error-btn" onclick="loadData()">Skúsiť znova</button>
      <div style="color:#555;font-size:12px;margin-top:16px">Uisti sa že Google Sheet je "Anyone with the link" → Viewer</div>`;
    document.getElementById('error').style.display='block';
  }
}

function switchTab(id,btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['tab-current','tab-diff','tab-chart'].forEach(t=>document.getElementById(t).style.display='none');
  document.getElementById('tab-'+id).style.display='block';
  if(id==='chart') updateLineChart();
}

function renderCurrent() {
  const {products,stores}=DATA;
  if(!products.length){document.getElementById('tab-current').innerHTML='<div class="center-msg">📭 Žiadne dáta.</div>';return;}

  let html='<div class="cards">';
  stores.forEach(store=>{
    const total=products.reduce((s,p)=>s+(p.stocks[store]||0),0);
    const c=storeColor(store);
    html+=`<div class="card" style="border-left-color:${c}">
      <div class="card-label">${store}</div>
      <div class="card-value mono" style="color:${c}">${total.toLocaleString('sk')}</div>
      <div class="card-unit">celkom ks</div></div>`;
  });
  html+='</div>';

  html+='<div class="table-wrap"><table><thead><tr><th style="text-align:left">Produkt</th><th>Cena</th>';
  stores.forEach(s=>html+=`<th style="color:${storeColor(s)};border-bottom:2px solid ${storeColor(s)}22">${s}</th>`);
  html+='</tr></thead><tbody>';
  products.forEach(p=>{
    html+=`<tr><td><div class="prod-name">${p.name}</div><div class="prod-artikl mono">#${p.artikl}</div></td>`;
    html+=`<td class="price mono">${p.price?p.price+' €':'–'}</td>`;
    stores.forEach(s=>html+=`<td>${stockBadge(p.stocks[s])}</td>`);
    html+='</tr>';
  });
  html+='</tbody></table></div>';

  html+='<div class="chart-box"><h3 class="chart-title">Zásoby podľa predajne</h3><canvas id="barChart" height="280"></canvas></div>';
  document.getElementById('tab-current').innerHTML=html;

  // Bar chart
  const ctx=document.getElementById('barChart');
  if(barChart) barChart.destroy();
  barChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:stores,
      datasets:products.map((p,i)=>({
        label:p.name,
        data:stores.map(s=>p.stocks[s]||0),
        backgroundColor:PRODUCT_COLORS[i%PRODUCT_COLORS.length],
        borderRadius:4,
      }))
    },
    options:{
      responsive:true,
      plugins:{legend:{labels:{color:'#888',font:{size:11}}}},
      scales:{
        x:{ticks:{color:'#888'},grid:{color:'#222'}},
        y:{ticks:{color:'#888'},grid:{color:'#222'}}
      }
    }
  });
}

function renderDiff() {
  const {products,stores,historyRuns,historyMatrix}=DATA;
  if(historyRuns.length<2){
    document.getElementById('tab-diff').innerHTML=`<div class="center-msg"><div style="font-size:48px;margin-bottom:12px">⏳</div><div>Potrebujem aspoň 2 behy scrapera.</div><div style="font-size:13px;margin-top:8px;color:#555">Spusti scraper ešte raz a refreshni.</div></div>`;
    return;
  }

  const pi=historyRuns.length-2, ci=historyRuns.length-1;
  let html=`<div class="diff-info">Porovnanie: <strong>${historyRuns[pi]}</strong> → <strong class="curr">${historyRuns[ci]}</strong>
    <span style="margin-left:12px;color:#666">|</span>
    <span style="margin-left:12px;color:#dc2626">▼ predané</span>
    <span style="margin-left:12px;color:#16a34a">▲ naskladnené</span></div>`;

  html+='<div class="table-wrap"><table><thead><tr><th style="text-align:left">Produkt</th><th>Predajňa</th><th style="color:#666">Predtým</th><th>Teraz</th><th style="color:#F4600C">Rozdiel</th></tr></thead><tbody>';

  products.forEach(prod=>{
    stores.forEach(store=>{
      const vals=historyMatrix[prod.name]?.[store];
      if(!vals) return;
      const prev=vals[pi], curr=vals[ci];
      if(prev===null&&curr===null) return;
      const pn=Number(prev),cn=Number(curr);
      const d=(!isNaN(pn)&&!isNaN(cn))?cn-pn:null;
      const cls=d!==null&&d<0?'diff-row-neg':d!==null&&d>0?'diff-row-pos':'';
      html+=`<tr class="${cls}"><td style="text-align:left;font-weight:500;font-size:13px">${prod.name}</td>`;
      html+=`<td style="color:${storeColor(store)};font-weight:600;font-size:13px">${store}</td>`;
      html+=`<td class="mono" style="color:#666;font-size:13px">${prev!==null?prev:'–'}</td>`;
      html+=`<td class="mono" style="font-weight:600;font-size:13px">${curr!==null?curr:'–'}</td>`;
      html+=`<td>${diffBadge(prev,curr)}</td></tr>`;
    });
  });
  html+='</tbody></table></div>';
  document.getElementById('tab-diff').innerHTML=html;
}

function renderChart() {
  const {products,stores,historyRuns}=DATA;
  if(!products.length) return;

  let html='<div class="product-btns">';
  products.forEach((p,i)=>{
    const c=PRODUCT_COLORS[i%PRODUCT_COLORS.length];
    const act=i===selectedProduct;
    html+=`<button class="prod-btn ${act?'active':''}" style="${act?`background:${c};border-color:${c};color:#fff`:''}" onclick="selectProduct(${i})">${p.name}</button>`;
  });
  html+='</div>';
  html+='<div class="chart-box"><h3 class="chart-title" id="chart-prod-name"></h3>';
  html+=`<p style="margin:0 0 20px 8px;font-size:12px;color:#666">Vývoj zásob v čase podľa predajne (${historyRuns.length} behov)</p>`;

  if(historyRuns.length<2){
    html+='<div class="center-msg"><div style="font-size:36px;margin-bottom:8px">📈</div><div>Graf sa zobrazí po 2+ behoch scrapera.</div></div>';
  } else {
    html+='<canvas id="lineChart" height="320"></canvas>';
  }
  html+='</div>';
  html+='<div class="tip">💡 Graf sa automaticky rozšíri s každým novým behom. Po niekoľkých týždňoch uvidíš sezónny trend.</div>';
  document.getElementById('tab-chart').innerHTML=html;
  updateLineChart();
}

function selectProduct(i) {
  selectedProduct=i;
  renderChart();
  document.getElementById('tab-chart').style.display='block';
}

function updateLineChart() {
  const {products,stores,historyRuns,historyMatrix}=DATA;
  const canvas=document.getElementById('lineChart');
  if(!canvas||historyRuns.length<2) return;

  const prodName=products[selectedProduct]?.name;
  const el=document.getElementById('chart-prod-name');
  if(el) el.textContent=prodName;

  const labels=historyRuns.map(r=>r.length>12?r.substring(0,12):r);
  const datasets=stores.map(store=>{
    const vals=historyMatrix[prodName]?.[store]||[];
    return {
      label:store,
      data:vals,
      borderColor:storeColor(store),
      backgroundColor:storeColor(store)+'33',
      borderWidth:2.5,
      pointRadius:5,
      pointBackgroundColor:storeColor(store),
      tension:0.1,
      spanGaps:true,
    };
  });

  if(lineChart) lineChart.destroy();
  lineChart=new Chart(canvas,{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,
      plugins:{legend:{labels:{color:'#888',font:{size:12}}}},
      scales:{
        x:{ticks:{color:'#888'},grid:{color:'#222'}},
        y:{ticks:{color:'#888'},grid:{color:'#222'}}
      }
    }
  });
}

// Init
loadData();
</script>
</body>
</html>
