<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hornbach Brikety Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #06080a;
  --surface: #0d1117;
  --surface2: #151b23;
  --surface3: #1c2333;
  --border: #21262d;
  --border-bright: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-muted: #484f58;
  --orange: #F4600C;
  --orange-glow: #F4600C44;
  --orange-dim: #c44d00;
  --green: #3fb950;
  --green-bg: #0d1f17;
  --yellow: #d29922;
  --yellow-bg: #1d1b0e;
  --red: #f85149;
  --red-bg: #1f0d0d;
  --blue: #58a6ff;
  --purple: #bc8cff;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
.mono { font-family: 'JetBrains Mono', monospace; }

/* ── Animated background ── */
.bg-mesh {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 800px 600px at 20% 10%, #F4600C08 0%, transparent 70%),
    radial-gradient(ellipse 600px 400px at 80% 80%, #58a6ff05 0%, transparent 70%),
    radial-gradient(ellipse 400px 300px at 50% 50%, #bc8cff03 0%, transparent 70%);
}

/* ── Header ── */
.header {
  position: relative; z-index: 1;
  background: linear-gradient(135deg, #F4600C 0%, #b8450a 40%, #8a3308 100%);
  padding: 0;
  overflow: hidden;
}
.header::before {
  content: ''; position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.header-inner {
  position: relative; z-index: 1;
  max-width: 1200px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: flex-end;
  flex-wrap: wrap; gap: 16px;
  padding: 36px 40px 32px;
}
.header-brand {
  display: flex; align-items: center; gap: 14px;
}
.header-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; border: 1px solid rgba(255,255,255,0.2);
}
.header-sub {
  font-size: 10px; font-weight: 700; letter-spacing: 4px;
  text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 4px;
}
.header h1 {
  font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.5px;
}
.header-right { display: flex; align-items: center; gap: 16px; }
.header-stat {
  background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
  padding: 8px 14px; display: flex; align-items: center; gap: 8px;
}
.header-stat .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
.header-stat span { color: rgba(255,255,255,0.8); font-size: 12px; font-weight: 600; }
.btn-refresh {
  background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff; border-radius: 10px; padding: 8px 18px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.25s;
}
.btn-refresh:hover { background: rgba(255,255,255,0.22); transform: translateY(-1px); }

/* ── Tabs ── */
.tabs-wrap {
  position: relative; z-index: 1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.tabs {
  max-width: 1200px; margin: 0 auto;
  display: flex; padding: 0 40px; gap: 4px;
}
.tab {
  background: transparent; border: none; color: var(--text-dim);
  font-size: 14px; font-weight: 600; padding: 16px 20px;
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.2s; font-family: inherit; position: relative;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--orange); border-bottom-color: var(--orange); }
.tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%;
  height: 2px; background: var(--orange); filter: blur(4px);
}

/* ── Content ── */
.content {
  position: relative; z-index: 1;
  padding: 28px 40px; max-width: 1200px; margin: 0 auto;
}

/* ── Cards ── */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-bottom: 28px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 20px 22px;
  position: relative; overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}
.card:hover { transform: translateY(-2px); border-color: var(--border-bright); }
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: 16px 16px 0 0;
}
.card-label { font-size: 12px; color: var(--text-dim); font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.card-label .dot-sm { width: 6px; height: 6px; border-radius: 50%; }
.card-value { font-size: 30px; font-weight: 800; letter-spacing: -1px; }
.card-unit { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* ── Glass panels ── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}
.panel-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.panel-title { font-size: 14px; font-weight: 700; color: var(--text-dim); }

/* ── Table ── */
.table-wrap {
  overflow: auto;
  max-height: 72vh;
  -webkit-overflow-scrolling: touch;
}
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead tr { background: var(--surface2); }
thead { position: sticky; top: 0; z-index: 2; }
th {
  padding: 12px 12px; font-weight: 700; font-size: 11px;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px;
  white-space: nowrap; background: var(--surface2);
}
th:first-child { text-align: left; padding-left: 22px; }
td { padding: 14px 12px; text-align: center; border-bottom: 1px solid var(--border); }
td:first-child { text-align: left; padding-left: 22px; }
tbody tr { transition: background 0.15s; }
tbody tr:hover { background: var(--surface2); }
.prod-name { font-weight: 700; font-size: 14px; color: var(--text); }
.prod-artikl { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.price-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg, #F4600C22, #F4600C11);
  border: 1px solid #F4600C33; border-radius: 8px;
  padding: 4px 10px; font-weight: 700; color: var(--orange); font-size: 13px;
}

/* ── Badges ── */
.badge {
  font-weight: 700; font-size: 13px; padding: 4px 12px;
  border-radius: 8px; display: inline-block; min-width: 52px;
  text-align: center; letter-spacing: -0.3px;
}
.badge-green { background: #3fb95018; color: #3fb950; border: 1px solid #3fb95030; }
.badge-lime { background: #a3e63518; color: #a3e635; border: 1px solid #a3e63530; }
.badge-yellow { background: #d2992218; color: #d29922; border: 1px solid #d2992230; }
.badge-red { background: #f8514918; color: #f85149; border: 1px solid #f8514930; }
.badge-grey { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
.diff-down { color: var(--red); font-weight: 700; font-size: 13px; }
.diff-up { color: var(--green); font-weight: 700; font-size: 13px; }
.diff-zero { color: var(--text-muted); font-size: 12px; }

/* ── Chart boxes ── */
.chart-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 24px;
  margin-top: 20px;
}
.chart-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.chart-title { font-size: 16px; font-weight: 800; color: var(--text); }
.chart-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* ── Product selector ── */
.prod-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.prod-btn {
  border-radius: 10px; padding: 10px 16px; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.25s; font-family: inherit;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text-dim); position: relative; overflow: hidden;
}
.prod-btn:hover { border-color: var(--border-bright); color: var(--text); transform: translateY(-1px); }
.prod-btn.active { color: #fff; border-color: transparent; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }

/* ── Diff ── */
.diff-banner {
  margin-bottom: 20px; padding: 16px 22px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; font-size: 14px; color: var(--text-dim);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.diff-arrow { color: var(--orange); font-size: 18px; font-weight: 800; }
.diff-label {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
}
.diff-label-red { background: #f8514915; color: var(--red); }
.diff-label-green { background: #3fb95015; color: var(--green); }
.diff-row-neg { background: #f851490a !important; }
.diff-row-pos { background: #3fb9500a !important; }

/* ── Loading / Error ── */
.center-msg { text-align: center; padding: 80px 20px; }
.spinner-ring {
  width: 48px; height: 48px;
  border: 3px solid var(--border);
  border-top: 3px solid var(--orange);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-btn {
  background: var(--orange); color: #fff; border: none;
  border-radius: 10px; padding: 12px 28px; font-size: 14px;
  font-weight: 700; cursor: pointer; margin-top: 16px;
  transition: transform 0.2s;
}
.error-btn:hover { transform: translateY(-2px); }
.tip {
  margin-top: 16px; padding: 16px 22px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; font-size: 13px; color: var(--text-muted);
  display: flex; align-items: flex-start; gap: 10px;
}
.tip-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

/* ── Y-axis toggle buttons ── */
.y-axis-btn {
  background: var(--surface2); color: var(--text-dim);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 14px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.2s;
}
.y-axis-btn:hover { border-color: var(--border-bright); color: var(--text); }
.y-axis-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }

/* ── Section labels ── */
.section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
}

/* ── Footer ── */
.footer {
  position: relative; z-index: 1;
  text-align: center; padding: 40px 20px;
  color: var(--text-muted); font-size: 12px;
  border-top: 1px solid var(--border);
  margin-top: 60px;
}
.footer a { color: var(--orange); text-decoration: none; }

/* ── Country selector ── */
.country-btns { display: flex; gap: 6px; }
.country-btn {
  background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7);
  border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: all 0.2s; letter-spacing: 0.5px;
}
.country-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
.country-btn.active { background: rgba(255,255,255,0.25); color: #fff; border-color: rgba(255,255,255,0.5); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .header-inner { padding: 24px 20px 20px; }
  .tabs { padding: 0 16px; }
  .content { padding: 20px 16px; }
  .header h1 { font-size: 22px; }
  .card-value { font-size: 24px; }
  .cards { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
}
</style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:16px">
      <div class="header-icon">🔥</div>
      <div>
        <div class="header-sub">Hornbach Brikety Tracker</div>
        <h1 id="header-title">Slovensko</h1>
      </div>
    </div>
    <div class="header-right">
      <div class="country-btns">
        <button class="country-btn active" onclick="switchCountry('SK',this)">SK</button>
        <button class="country-btn" onclick="switchCountry('CZ',this)">CZ</button>
        <button class="country-btn" onclick="switchCountry('AT',this)">AT</button>
      </div>
      <div class="header-stat">
        <div class="dot"></div>
        <span class="mono" id="run-count">Načítavam...</span>
      </div>
      <button class="btn-refresh" onclick="loadData()">↻ Obnoviť</button>
    </div>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" data-tab="current" onclick="switchTab('current',this)">📊 Aktuálny stav</button>
    <button class="tab" data-tab="diff" onclick="switchTab('diff',this)">🔄 Porovnanie</button>
    <button class="tab" data-tab="chart" onclick="switchTab('chart',this)">📈 Trend</button>
    <button class="tab" data-tab="tonaz" onclick="switchTab('tonaz',this)">⚖️ Tonáž</button>
  </div>
</div>

<div class="content">
  <div id="loading" class="center-msg"><div class="spinner-ring"></div><div style="color:var(--text-dim);font-size:15px;font-weight:600">Načítavam dáta z Google Sheets</div><div style="color:var(--text-muted);font-size:12px;margin-top:6px">Prvé načítanie môže trvať pár sekúnd...</div></div>
  <div id="error" class="center-msg" style="display:none"></div>
  <div id="tab-current" style="display:none"></div>
  <div id="tab-diff" style="display:none"></div>
  <div id="tab-chart" style="display:none"></div>
  <div id="tab-tonaz" style="display:none"></div>
</div>

<div class="footer">
  Hornbach Brikety Tracker · Automatický scraping cez <a href="#">GitHub Actions</a> · Dáta živé z Google Sheets
</div>

<script>
const SHEET_ID = '1TFzGrj5gJ5_j46iTSHCBLLT_DFkzVabZ5Ko6jwzik-s';

const COUNTRY_CONFIG = {
  SK: { label: 'Slovensko',   tabCurrent: 'Posledný beh',     tabHistory: 'História' },
  CZ: { label: 'Česká republika', tabCurrent: 'CZ Posledný beh', tabHistory: 'CZ História' },
  AT: { label: 'Österreich',  tabCurrent: 'AT Posledný beh',  tabHistory: 'AT História' },
};
let currentCountry = 'SK';
const STORE_COLORS = {
  'Nitra':{ c:'#F4600C', g:'linear-gradient(135deg,#F4600C,#d9540b)' },
  'BA Ružinov':{ c:'#58a6ff', g:'linear-gradient(135deg,#58a6ff,#388bfd)' },
  'BA Devínska':{ c:'#bc8cff', g:'linear-gradient(135deg,#bc8cff,#a371f7)' },
  'Košice':{ c:'#3fb950', g:'linear-gradient(135deg,#3fb950,#2ea043)' },
  'Prešov':{ c:'#d29922', g:'linear-gradient(135deg,#d29922,#bb8009)' },
};
const PRODUCT_COLORS = ['#F4600C','#58a6ff','#bc8cff','#3fb950','#d29922','#f85149','#39d2c0'];

const CATEGORY_DEFS = [
  { name: 'Valcové', color: '#F4600C', g: 'linear-gradient(135deg,#F4600C,#d9540b)', keys: ['valcov', 'brikett'] },
  { name: 'Tehlové', color: '#58a6ff', g: 'linear-gradient(135deg,#58a6ff,#388bfd)', keys: ['tehl', 'hranat', 'ruf'] },
  { name: 'Pelety',  color: '#3fb950', g: 'linear-gradient(135deg,#3fb950,#2ea043)', keys: ['pelet', 'pellet'] },
  { name: 'Drevo',   color: '#d29922', g: 'linear-gradient(135deg,#d29922,#bb8009)', keys: ['drevo', 'triesk', 'brennholz', 'scheit'] },
  { name: 'Iné',     color: '#8b949e', g: 'linear-gradient(135deg,#8b949e,#6e7681)', keys: [] },
];

// Tonáž view: category → display label + unit
const TONAZ_CATS = [
  { catName: 'Valcové', label: 'Valce',   unit: 't'   },
  { catName: 'Tehlové', label: 'Tehla',   unit: 't'   },
  { catName: 'Pelety',  label: 'PA1',     unit: 't'   },
  { catName: 'Drevo',   label: 'DreTri',  unit: 'pal' },
];

function stripDia(s) {
  return s.normalize('NFD').replace(/\p{Diacritic}/gu, '');
}

function getCategory(name) {
  const n = stripDia(name.toLowerCase());
  // Check Tehlové before Valcové so "hranaté/RUF" beats generic "brikett" catch-all
  const matchOrder = ['Tehlové', 'Valcové', 'Pelety', 'Drevo'];
  for (const catName of matchOrder) {
    const cat = CATEGORY_DEFS.find(c => c.name === catName);
    if (cat && cat.keys.some(k => n.includes(stripDia(k)))) return cat;
  }
  return CATEGORY_DEFS[CATEGORY_DEFS.length - 1];
}

function sortByCategory(arr) {
  return [...arr].sort((a, b) => {
    const ia = CATEGORY_DEFS.findIndex(c => c.name === getCategory(a.name).name);
    const ib = CATEGORY_DEFS.findIndex(c => c.name === getCategory(b.name).name);
    return ia - ib;
  });
}

let DATA = { products:[], stores:[], historyRuns:[], historyMatrix:{} };
let selectedProduct = 0;
let barChart = null, lineChart = null;
let yAxisMode = 'zero';

// Deterministic color from string — works for any store name in any country
function hashColor(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  // Map to one of several distinct hues, avoiding reds already used for Valcové category
  const hues = [210, 155, 280, 45, 190, 320, 90, 25, 240, 170, 60, 300];
  const hue = hues[Math.abs(h) % hues.length];
  const c = `hsl(${hue},70%,58%)`;
  const c2 = `hsl(${hue},70%,46%)`;
  return { c, g: `linear-gradient(135deg,${c},${c2})` };
}

function storeColor(s) {
  // Stable overrides for known SK stores keep their original branded colors
  const l = stripDia(s.toLowerCase());
  if (l.includes('nitra')) return STORE_COLORS['Nitra'];
  if (l.includes('ruzinov')) return STORE_COLORS['BA Ružinov'];
  if (l.includes('devin')) return STORE_COLORS['BA Devínska'];
  if (l.includes('kosic')) return STORE_COLORS['Košice'];
  if (l.includes('presov')) return STORE_COLORS['Prešov'];
  return hashColor(s);
}

function parseCsvRow(line) {
  const r=[]; let c='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(q&&i+1<line.length&&line[i+1]==='"'){c+='"';i++}else q=!q}
    else if(ch===','&&!q){r.push(c);c=''}else c+=ch;
  }
  r.push(c); return r;
}

function parseCsv(text) {
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2) return [];
  const headers=parseCsvRow(lines[0]);
  return lines.slice(1).map(line=>{
    const vals=parseCsvRow(line);
    const obj={};
    headers.forEach((h,i)=>{obj[h.trim()]=(vals[i]||'').trim()});
    return obj;
  });
}

async function fetchSheet(name) {
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error(`Sheet "${name}": HTTP ${res.status}`);
  return parseCsv(await res.text());
}

function stockBadge(val) {
  if(val===null||val===undefined||val==='–'||val==='') return '<span class="badge badge-grey mono">–</span>';
  const n=Number(val);
  if(isNaN(n)) return '<span class="badge badge-grey mono">–</span>';
  let cls='badge-green';
  if(n===0) cls='badge-red'; else if(n<20) cls='badge-yellow'; else if(n<100) cls='badge-lime';
  return `<span class="badge ${cls} mono">${n.toLocaleString('sk')}</span>`;
}

function diffBadge(prev,curr) {
  const p=Number(prev),c=Number(curr);
  if(isNaN(p)||isNaN(c)) return '<span class="badge badge-grey mono">–</span>';
  const d=c-p;
  if(d===0) return '<span class="diff-zero mono">—</span>';
  if(d<0) return `<span class="diff-down mono">▼ ${Math.abs(d).toLocaleString('sk')}</span>`;
  return `<span class="diff-up mono">▲ ${d.toLocaleString('sk')}</span>`;
}

async function loadData() {
  tonazDataCache = null; // reset so Tonáž reloads fresh data
  document.getElementById('loading').style.display='block';
  document.getElementById('error').style.display='none';
  ['tab-current','tab-diff','tab-chart'].forEach(id=>document.getElementById(id).style.display='none');

  try {
    const cfg = COUNTRY_CONFIG[currentCountry];
    const [current, history] = await Promise.all([fetchSheet(cfg.tabCurrent), fetchSheet(cfg.tabHistory)]);

    const fixedCols=['Produkt','Artikl č.','Cena'];
    const stores=Object.keys(current[0]||{}).filter(k=>!fixedCols.includes(k)&&k.trim());
    const products=current.map(row=>({
      name:row['Produkt']||'',
      artikl:String(row['Artikl č.']||'').replace(/\.0$/,''),
      price:row['Cena']||'',
      stocks:{}
    }));
    products.forEach((p,idx)=>{
      stores.forEach(s=>{
        const raw=current[idx][s];
        p.stocks[s]=(raw==='–'||raw==='')?null:Number(raw);
      });
    });

    const histFixed=['Produkt','Artikl č.','Predajňa','Kľúč'];
    const dateCols=Object.keys(history[0]||{}).filter(k=>!histFixed.includes(k)&&k.trim());
    const matrix={};
    history.forEach(row=>{
      const prod=row['Produkt']||'',store=row['Predajňa']||'';
      if(!prod||!store) return;
      if(!matrix[prod]) matrix[prod]={};
      if(!matrix[prod][store]) matrix[prod][store]=[];
      dateCols.forEach(dc=>{
        const raw=row[dc];
        const val=(raw==='–'||raw===''||raw===undefined)?null:Number(raw);
        matrix[prod][store].push(isNaN(val)?null:val);
      });
    });

    DATA={products,stores,historyRuns:dateCols,historyMatrix:matrix};
    const runText = dateCols.length === 1 ? '1 beh' : dateCols.length + ' behov';
    document.getElementById('run-count').textContent = runText;
    document.getElementById('loading').style.display='none';
    renderCurrent();
    renderDiff();
    renderChart();
    switchTab('current',document.querySelector('.tab.active'));
  } catch(e) {
    document.getElementById('loading').style.display='none';
    document.getElementById('error').innerHTML=`
      <div style="font-size:56px;margin-bottom:16px">⚠️</div>
      <div style="color:var(--red);font-size:17px;font-weight:700;margin-bottom:10px">Nepodarilo sa načítať dáta</div>
      <div style="color:var(--text-dim);font-size:13px;max-width:420px;margin:0 auto;line-height:1.6">${e.message}</div>
      <button class="error-btn" onclick="loadData()">Skúsiť znova</button>
      <div style="color:var(--text-muted);font-size:12px;margin-top:20px">Google Sheet musí byť nastavený na "Ktokoľvek s odkazom → Čitateľ"</div>`;
    document.getElementById('error').style.display='block';
  }
}

function switchCountry(country, btn) {
  currentCountry = country;
  document.querySelectorAll('.country-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

function switchTab(id,btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['tab-current','tab-diff','tab-chart','tab-tonaz'].forEach(t=>document.getElementById(t).style.display='none');

}

function renderDiff() {
  const {products,stores,historyRuns,historyMatrix}=DATA;
  if(historyRuns.length<2){
    document.getElementById('tab-diff').innerHTML=`<div class="center-msg">
      <div style="font-size:56px;margin-bottom:16px">⏳</div>
      <div style="font-size:16px;font-weight:700">Čakám na viac dát</div>
      <div style="color:var(--text-muted);font-size:13px;margin-top:8px;line-height:1.6">Potrebujem aspoň 2 behy scrapera na porovnanie.<br>Spusti scraper ešte raz cez GitHub Actions.</div></div>`;
    return;
  }

  const pi=historyRuns.length-2, ci=historyRuns.length-1;
  const sorted=sortByCategory(products);

  let html=`<div class="diff-banner">
    <span style="font-weight:700;color:var(--text)">${historyRuns[pi]}</span>
    <span class="diff-arrow">→</span>
    <span style="font-weight:700;color:var(--orange)">${historyRuns[ci]}</span>
    <span style="flex:1"></span>
    <span class="diff-label diff-label-red">▼ predané</span>
    <span class="diff-label diff-label-green">▲ naskladnené</span>
  </div>`;

  // Category net summary chips
  const catNets=CATEGORY_DEFS.slice(0,-1).map(cat=>{
    const ps=products.filter(p=>getCategory(p.name).name===cat.name);
    if(!ps.length) return null;
    let net=0;
    ps.forEach(prod=>{
      stores.forEach(store=>{
        const vals=historyMatrix[prod.name]?.[store];
        if(!vals) return;
        const pn=Number(vals[pi]), cn=Number(vals[ci]);
        if(!isNaN(pn)&&!isNaN(cn)) net+=cn-pn;
      });
    });
    return {cat,net};
  }).filter(Boolean);

  if(catNets.length>0){
    html+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">';
    catNets.forEach(({cat,net})=>{
      const sign=net<0?'▼ ':net>0?'▲ ':'';
      const color=net<0?'var(--red)':net>0?'var(--green)':'var(--text-muted)';
      html+=`<div style="display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 16px">
        <span style="width:8px;height:8px;border-radius:50%;background:${cat.color};flex-shrink:0;display:inline-block"></span>
        <span style="font-size:12px;font-weight:700;color:var(--text-dim)">${cat.name}</span>
        <span style="font-size:14px;font-weight:800;color:${color};font-family:'JetBrains Mono',monospace">${sign}${Math.abs(net).toLocaleString('sk')}</span>
      </div>`;
    });
    html+='</div>';
  }

  html+='<div class="panel"><div class="table-wrap"><table><thead><tr>';
  html+='<th style="text-align:left;padding-left:22px">Produkt</th><th>Predajňa</th><th style="color:var(--text-muted)">Predtým</th><th>Teraz</th><th style="color:var(--orange)">Rozdiel</th>';
  html+='</tr></thead><tbody>';

  let lastCat='';
  sorted.forEach(prod=>{
    const cat=getCategory(prod.name);
    stores.forEach(store=>{
      const vals=historyMatrix[prod.name]?.[store];
      if(!vals) return;
      const prev=vals[pi], curr=vals[ci];
      if(prev===null&&curr===null) return;
      const pn=Number(prev),cn=Number(curr);
      const d=(!isNaN(pn)&&!isNaN(cn))?cn-pn:null;
      const cls=d!==null&&d<0?'diff-row-neg':d!==null&&d>0?'diff-row-pos':'';
      const sc=storeColor(store);
      if(cat.name!==lastCat){
        lastCat=cat.name;
        html+=`<tr><td colspan="5" style="padding:7px 22px;background:${cat.color}14;border-top:2px solid ${cat.color}40;border-bottom:1px solid ${cat.color}28">
          <span style="font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:${cat.color}">${cat.name}</span>
        </td></tr>`;
      }
      html+=`<tr class="${cls}">
        <td style="text-align:left;padding-left:22px;font-weight:600;font-size:13px">${prod.name}</td>
        <td><span style="color:${sc.c};font-weight:700;font-size:13px">${store}</span></td>
        <td class="mono" style="color:var(--text-muted);font-size:13px">${prev!==null?Number(prev).toLocaleString('sk'):'–'}</td>
        <td class="mono" style="font-weight:700;font-size:13px;color:var(--text)">${curr!==null?Number(curr).toLocaleString('sk'):'–'}</td>
        <td>${diffBadge(prev,curr)}</td></tr>`;
    });
  });
  html+='</tbody></table></div></div>';
  document.getElementById('tab-diff').innerHTML=html;
}

function extractWeightKg(name) {
  const m = name.match(/(\d+(?:[,\.]\d+)?)\s*kg/i);
  if (!m) return null;
  return parseFloat(m[1].replace(',', '.'));
}

function parseRunDate(label) {
  const m = label.match(/(\d+)\.(\d+)\.(\d+)\s+(\d+):(\d+)/);
  if (!m) return null;
  return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5]);
}

function getMonthKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
}

function getMonthLabel(key) {
  const [y, m] = key.split('-');
  const names = ['JAN','FEB','MAR','APR','MÁJ','JÚN','JÚL','AUG','SEP','OKT','NOV','DEC'];
  return `${names[+m-1]}'${y.slice(2)}`;
}

// Returns { monthKey → { productName → { storeName → sold_packages } } }
function calcMonthlySold(histData) {
  const histFixed = ['Produkt', 'Artikl č.', 'Predajňa', 'Kľúč'];
  if (!histData || !histData.length) return {};
  const dateCols = Object.keys(histData[0]).filter(k => !histFixed.includes(k) && k.trim());
  if (!dateCols.length) return {};

  const colMonths = dateCols.map(col => {
    const d = parseRunDate(col);
    return d ? getMonthKey(d) : null;
  });
  const allMonths = [...new Set(colMonths.filter(Boolean))].sort();
  const result = {};
  allMonths.forEach(mk => { result[mk] = {}; });

  histData.forEach(row => {
    const prod = row['Produkt'] || '';
    const store = row['Predajňa'] || '';
    if (!prod || !store) return;

    const vals = dateCols.map(col => {
      const raw = row[col];
      if (raw === '–' || raw === '' || raw == null) return null;
      const n = Number(raw);
      return isNaN(n) ? null : n;
    });

    allMonths.forEach(mk => {
      const monthIdxs = colMonths.map((m, i) => m === mk ? i : -1).filter(i => i >= 0);
      if (!monthIdxs.length) return;

      // Start: last valid reading before this month, or first reading in month
      let startVal = null;
      for (let i = monthIdxs[0] - 1; i >= 0; i--) {
        if (vals[i] !== null) { startVal = vals[i]; break; }
      }
      if (startVal === null) {
        for (const idx of monthIdxs) {
          if (vals[idx] !== null) { startVal = vals[idx]; break; }
        }
      }

      // End: last valid reading in month
      let endVal = null;
      for (let i = monthIdxs.length - 1; i >= 0; i--) {
        if (vals[monthIdxs[i]] !== null) { endVal = vals[monthIdxs[i]]; break; }
      }

      if (startVal === null || endVal === null) return;
      const sold = Math.max(0, startVal - endVal);
      if (!result[mk][prod]) result[mk][prod] = {};
      result[mk][prod][store] = (result[mk][prod][store] || 0) + sold;
    });
  });

  return result;
}

let tonazDataCache = null;

async function renderTonaz() {
  const el = document.getElementById('tab-tonaz');
  if (tonazDataCache && tonazDataCache._rendered) return; // already rendered
  el.innerHTML = '<div class="center-msg"><div class="spinner-ring"></div><div style="color:var(--text-dim);font-size:15px;font-weight:600">Načítavam tonážne dáta...</div></div>';

  try {
    if (!tonazDataCache) {
      const [histSK, histCZ, histAT] = await Promise.all([
        fetchSheet('História'),
        fetchSheet('CZ História'),
        fetchSheet('AT História'),
      ]);
      tonazDataCache = { SK: histSK, CZ: histCZ, AT: histAT };
    }

    const soldByCountry = {
      SK: calcMonthlySold(tonazDataCache.SK),
      CZ: calcMonthlySold(tonazDataCache.CZ),
      AT: calcMonthlySold(tonazDataCache.AT),
    };

    // Build product→weight map across all countries
    const prodWeights = {};
    ['SK','CZ','AT'].forEach(cc => {
      (tonazDataCache[cc] || []).forEach(row => {
        const name = row['Produkt'];
        if (name && prodWeights[name] === undefined) {
          prodWeights[name] = extractWeightKg(name);
        }
      });
    });

    const allMonths = [...new Set([
      ...Object.keys(soldByCountry.SK),
      ...Object.keys(soldByCountry.CZ),
      ...Object.keys(soldByCountry.AT),
    ])].sort().reverse(); // newest first

    const countries = ['SK','CZ','AT'];
    const countryLabels = { SK: 'Hornbach SK', CZ: 'Hornbach CZ', AT: 'Hornbach AT' };

    function getCatValue(monthSold, catName, unit) {
      let totalKg = 0, totalPal = 0, hasData = false;
      Object.entries(monthSold || {}).forEach(([prodName, storeMap]) => {
        if (getCategory(prodName).name !== catName) return;
        const packs = Object.values(storeMap).reduce((s, v) => s + v, 0);
        if (packs > 0) hasData = true;
        if (unit === 't') {
          const w = prodWeights[prodName];
          if (w) totalKg += packs * w;
        } else {
          totalPal += packs;
        }
      });
      if (!hasData) return null;
      return unit === 't' ? totalKg / 1000 : totalPal;
    }

    if (!allMonths.length) {
      el.innerHTML = '<div class="center-msg"><div style="font-size:56px;margin-bottom:16px">📊</div><div style="font-size:15px;font-weight:600">Žiadne historické dáta</div><div style="color:var(--text-muted);font-size:13px;margin-top:6px">Spusti scraper aspoň raz.</div></div>';
      return;
    }

    let html = '<div class="panel" style="margin-top:4px"><div class="table-wrap"><table>';
    html += '<thead><tr>';
    html += '<th style="text-align:left;padding-left:22px;min-width:90px">Mesiac</th>';
    html += '<th style="text-align:left;min-width:110px">Typ</th>';
    countries.forEach(cc => {
      html += `<th style="min-width:130px"><span style="color:var(--orange)">${countryLabels[cc]}</span></th>`;
    });
    html += '</tr></thead><tbody>';

    allMonths.forEach((mk, mi) => {
      const mLabel = getMonthLabel(mk);
      // Month header row
      html += `<tr style="background:var(--surface2)"><td colspan="${2+countries.length}" style="padding:8px 22px;border-top:2px solid var(--border-bright)">
        <span style="font-size:13px;font-weight:800;color:var(--orange)">${mLabel}</span>
        <span style="font-size:11px;color:var(--text-muted);margin-left:10px;letter-spacing:1px;text-transform:uppercase">predané v mesiaci</span>
      </td></tr>`;

      TONAZ_CATS.forEach(tc => {
        const vals = countries.map(cc => getCatValue(soldByCountry[cc][mk], tc.catName, tc.unit));
        html += `<tr>
          <td></td>
          <td style="text-align:left;font-weight:700;font-size:13px;color:var(--text-dim)">
            ${tc.label} <span style="font-size:10px;color:var(--text-muted);font-weight:600">(${tc.unit})</span>
          </td>`;
        vals.forEach(v => {
          if (v === null) {
            html += '<td><span style="color:var(--text-muted);font-size:12px">–</span></td>';
          } else {
            const fmt = tc.unit === 't' ? v.toFixed(2) : v.toLocaleString('sk');
            const color = v > 0 ? 'var(--text)' : 'var(--text-muted)';
            html += `<td><span class="mono" style="font-weight:700;font-size:13px;color:${color}">${fmt}</span></td>`;
          }
        });
        html += '</tr>';
      });
    });

    html += '</tbody></table></div></div>';
    html += `<div class="tip" style="margin-top:16px"><span class="tip-icon">💡</span>
      <span>Tonáž = predané balenia × hmotnosť balenia ÷ 1000. Hmotnosť sa extrahuje z názvu produktu (napr. "10 kg").
      DreTri sa počíta v paletách. Zobrazené sú iba Hornbach predajne.</span></div>`;
    el.innerHTML = html;
    tonazDataCache._rendered = true;
  } catch(e) {
    el.innerHTML = `<div class="center-msg">
      <div style="font-size:56px;margin-bottom:16px">⚠️</div>
      <div style="color:var(--red);font-size:17px;font-weight:700;margin-bottom:8px">Chyba načítania</div>
      <div style="color:var(--text-dim);font-size:13px">${e.message}</div>
      <button class="error-btn" onclick="tonazDataCache=null;renderTonaz()">Skúsiť znova</button>
    </div>`;
  }
}

Chart.defaults.font.family = "'Plus Jakarta Sans', system-ui, sans-serif";

loadData();
</script>
